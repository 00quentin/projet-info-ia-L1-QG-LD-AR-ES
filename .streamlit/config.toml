[theme]
# Couleur primary unifiée — indigo, cohérent avec --accent (#6366f1) du CSS.
# Remplace le rouge par défaut de Streamlit, utilisé pour radios, sliders,
# focus rings, etc. Tout reste cohérent avec le dashboard.
primaryColor = "#6366f1"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8fafc"
textColor = "#1e293b"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "viewer"

[browser]
gatherUsageStats = false
